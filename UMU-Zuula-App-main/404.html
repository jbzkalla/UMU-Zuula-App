<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .error-container { text-align: center; background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 6rem; color: #dc3545; margin: 0; }
        h3 { color: #343a40; }
        p { color: #6c757d; margin-bottom: 2rem; }
        a { text-decoration: none; padding: 12px 24px; background: #0d6efd; color: white; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        a:hover { background: #0b5ed7; box-shadow: 0 4px 10px rgba(13,110,253,0.3); }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h3>Oops! Page Not Found</h3>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="./">Return to Homepage</a>
    </div>
</body>
</html>
